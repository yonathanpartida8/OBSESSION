<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Te amo Johana y Marissa ❤️</title>
  <style>
    /* Reset y base — todo al límite del romanticismo */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; /* quita flash en tap mobile */
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;            /* sin scroll, solo la magia */
      background: #0d000d;         /* fondo profundo tipo terciopelo */
    }

    /* Lienzo de partículas (corazones) — detrás de los textos */
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      pointer-events: none;        /* los toques pasan al detector de música/burst */
    }

    /* Capa de contenido principal — todo lo textual */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;         /* deja pasar los toques hacia el detector */
      font-family: 'Brush Script MT', 'cursive', 'Segoe UI', 'Great Vibes', cursive;
      color: #fff9f9;
      text-shadow: 0 0 15px #ff1a75, 0 0 30px #ff4da6, 2px 2px 4px rgba(0,0,0,0.6);
    }

    /* Mensajes principales — grandes, elegantes, con latido */
    .main-message {
      text-align: center;
      transform: scale(1);
      animation: softPulse 4s infinite ease-in-out;
    }

    .line1 {
      font-size: clamp(2.8rem, 15vw, 5.5rem);
      line-height: 1.2;
      letter-spacing: 2px;
      margin-bottom: 0.2rem;
      background: linear-gradient(45deg, #ffb3d9, #ffd9e6, #ffe6f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px #ff66b2, 0 0 45px #ffb3d9;
    }

    .line2 {
      font-size: clamp(2.2rem, 12vw, 4.5rem);
      line-height: 1.3;
      background: linear-gradient(135deg, #ffe6f0, #ffcce0, #ff99bb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px #ff3385, 0 0 40px #ff80bf;
    }

    .names {
      margin-top: 1.2rem;
      font-size: clamp(1.6rem, 8vw, 3.2rem);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      opacity: 0.95;
      animation: gentleFloat 6s infinite alternate;
    }

    .names span {
      display: block;
      background: rgba(255, 20, 100, 0.2);
      backdrop-filter: blur(2px);
      padding: 0.1rem 1.8rem;
      border-radius: 3rem;
      box-shadow: 0 0 30px #ff99cc;
      border: 1px solid rgba(255, 182, 193, 0.7);
    }

    /* Corazones y textos flotantes (CSS puro) */
    .floating-elements {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;                 /* por encima del canvas pero sigue siendo decorativo */
      pointer-events: none;
    }

    .floating-elements i {
      position: absolute;
      font-style: normal;
      color: #ff99bb;
      font-size: 2rem;
      opacity: 0.6;
      text-shadow: 0 0 15px deeppink;
      animation: floatAround 12s infinite linear;
      user-select: none;
    }

    /* Muchos elementos flotantes con mensajes y corazones */
    .floating-elements i:nth-child(1) { content: "❤️"; top: 10%; left: 5%; animation-duration: 14s; }
    .floating-elements i:nth-child(2) { content: "Te amo Johana"; top: 70%; left: 85%; font-size: 1.6rem; animation-duration: 18s; }
    .floating-elements i:nth-child(3) { content: "💖"; top: 20%; left: 90%; animation-duration: 11s; }
    .floating-elements i:nth-child(4) { content: "Me encantas Marissa"; top: 85%; left: 10%; font-size: 1.8rem; animation-duration: 20s; }
    .floating-elements i:nth-child(5) { content: "✨"; top: 45%; left: 20%; animation-duration: 16s; }
    .floating-elements i:nth-child(6) { content: "Te amo"; top: 15%; left: 75%; font-size: 1.5rem; animation-duration: 13s; }
    .floating-elements i:nth-child(7) { content: "🌸"; top: 60%; left: 40%; animation-duration: 17s; }
    .floating-elements i:nth-child(8) { content: "Johana ❤️ Marissa"; top: 30%; left: 30%; font-size: 1.8rem; animation-duration: 22s; }
    .floating-elements i:nth-child(9) { content: "💞"; top: 50%; left: 70%; animation-duration: 15s; }
    .floating-elements i:nth-child(10) { content: "te amo"; top: 80%; left: 55%; font-size: 1.4rem; animation-duration: 19s; }

    /* Indicador sutil para empezar (solo visible antes del primer toque) */
    .tap-hint {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      font-family: 'Arial', sans-serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 8px black;
      animation: blinkHint 3s infinite;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      padding: 8px 0;
      letter-spacing: 2px;
    }

    /* Animaciones */
    @keyframes softPulse {
      0% { transform: scale(1); text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff99cc; }
      50% { transform: scale(1.02); text-shadow: 0 0 35px #ff80bf, 0 0 70px #ffcce0; }
      100% { transform: scale(1); text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff99cc; }
    }

    @keyframes gentleFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-12px); }
    }

    @keyframes floatAround {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0.4; }
      25% { transform: translate(20px, -15px) rotate(5deg); opacity: 0.8; }
      50% { transform: translate(-10px, -30px) rotate(-3deg); opacity: 0.5; }
      75% { transform: translate(15px, -10px) rotate(4deg); opacity: 0.7; }
      100% { transform: translate(0, 0) rotate(0deg); opacity: 0.4; }
    }

    @keyframes blinkHint {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* Estilo para el audio (invisible) */
    audio {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Audio que reproducirá "musica.mp3" (debe estar en la misma carpeta) -->
  <audio id="bgMusic" src="musica.mp3" loop preload="auto"></audio>

  <!-- Canvas para efectos táctiles y partículas de fondo (corazones dinámicos) -->
  <canvas id="canvas"></canvas>

  <!-- Mensajes principales de amor -->
  <div class="content">
    <div class="main-message">
      <div class="line1">Te amo, Johana</div>
      <div class="line2">me encantas, Marissa</div>
    </div>
    <div class="names">
      <span>✨ Johana ✨</span>
      <span>💖 Marissa 💖</span>
    </div>
  </div>

  <!-- Elementos decorativos flotantes (CSS puro) con los nombres y mensajes -->
  <div class="floating-elements">
    <i>❤️</i>
    <i>Te amo Johana</i>
    <i>💖</i>
    <i>Me encantas Marissa</i>
    <i>✨</i>
    <i>Te amo</i>
    <i>🌸</i>
    <i>Johana ❤️ Marissa</i>
    <i>💞</i>
    <i>te amo</i>
  </div>

  <!-- Hint táctil para iniciar música y burst -->
  <div class="tap-hint" id="tapHint">💓 toca la pantalla (amor y música) 💓</div>

  <script>
    (function() {
      "use strict";

      // ----- configuración inicial -----
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const audio = document.getElementById('bgMusic');
      const hint = document.getElementById('tapHint');

      let width, height;
      let hearts = [];                 // partículas de corazón
      let musicStarted = false;        // control para la reproducción (una vez)
      let animationFrame = null;

      // Colores románticos para variar
      const colorPalette = [
        'rgba(255, 82, 150, {{opacity}})',
        'rgba(255, 128, 191, {{opacity}})',
        'rgba(255, 51, 133, {{opacity}})',
        'rgba(255, 105, 180, {{opacity}})',
        'rgba(255, 20, 147, {{opacity}})'
      ];

      // ----- ajustar canvas al tamaño de la ventana -----
      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // ----- crear corazón partícula (para burst o fondo) -----
      function addHeart(x, y, size = null, speed = null, opacity = 1.0, life = 1.0) {
        const baseSize = size || (Math.random() * 24 + 16);        // 16px ~ 40px
        const baseSpeed = speed || (Math.random() * 0.7 + 0.4);    // velocidad de subida
        const baseOpacity = opacity;
        const baseLife = life;                                      // vida para burst (1 = nuevo, se desvanece)
        hearts.push({
          x, y,
          size: baseSize,
          speed: baseSpeed,
          opacity: baseOpacity,
          life: baseLife,
          sway: Math.random() * 0.02 - 0.01,   // ligero movimiento horizontal
          colorIndex: Math.floor(Math.random() * colorPalette.length)
        });
      }

      // ----- generar corazones ambientales desde la parte inferior -----
      function spawnAmbientHeart() {
        if (!width || !height) return;
        const x = Math.random() * width;
        const y = height + 10;                          // justo debajo del canvas
        const size = Math.random() * 24 + 14;           // tamaños variados
        const speed = Math.random() * 0.6 + 0.3;
        addHeart(x, y, size, speed, 0.5 + Math.random() * 0.3);
      }

      // ----- explosión de corazones en un punto (efecto touch) -----
      function burstHearts(px, py, count = 18) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * 130 + 30;    // radio de explosión
          const dx = Math.cos(angle) * distance;
          const dy = Math.sin(angle) * distance - 30;   // ligera inclinación hacia arriba
          const x = px + dx;
          const y = py + dy;
          // Cada corazón del burst tiene vida corta (se desvanece al subir)
          const size = Math.random() * 26 + 16;
          const speed = Math.random() * 0.5 + 0.3;
          const life = 1.0;
          addHeart(x, y, size, speed, 0.9, life);
        }
      }

      // ----- animación y renderizado en canvas -----
      function drawHearts() {
        ctx.clearRect(0, 0, width, height);

        // Recorremos de atrás adelante para poder eliminar mientras iteramos
        for (let i = hearts.length - 1; i >= 0; i--) {
          const h = hearts[i];

          // Actualizar posición (flotar hacia arriba y ligero sway)
          h.y -= h.speed;
          h.x += Math.sin(h.y * 0.01 + i) * 0.8;   // suave vaivén

          // Si es un corazón de burst (con life) se desvanece gradualmente
          if (h.life < 1.0) {
            h.life -= 0.002;
            h.opacity = h.life * 0.9;
          } else {
            // ambientales se desvanecen al llegar arriba
            if (h.y < -50) {
              hearts.splice(i, 1);
              continue;
            }
            // también pueden perdurar, pero si suben demasiado se borran
          }

          // Si la opacidad es muy baja o se salió de rango, eliminar
          if (h.opacity <= 0.02 || h.y < -100 || h.y > height + 200) {
            hearts.splice(i, 1);
            continue;
          }

          // Dibujar corazón usando un emoji (o texto) con el tamaño y opacidad
          ctx.font = `${Math.floor(h.size)}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', 'Arial', 'sans-serif'`;
          let colorTemplate = colorPalette[h.colorIndex % colorPalette.length];
          let color = colorTemplate.replace('{{opacity}}', h.opacity);
          ctx.fillStyle = color;

          // Sombra suave que brilla
          ctx.shadowColor = `rgba(255, 80, 150, ${h.opacity * 0.9})`;
          ctx.shadowBlur = 20;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;

          // Dibujar el corazón (❤️) o texto "te amo" diminuto para algunos
          if (Math.random() > 0.75 && h.size > 22) {
            // De vez en cuando, escribimos mini "te amo" o iniciales para más detalle
            ctx.fillText('💘', h.x, h.y);
          } else {
            ctx.fillText('❤️', h.x, h.y);
          }
        }

        // Resetear sombra para el próximo frame
        ctx.shadowBlur = 0;

        animationFrame = requestAnimationFrame(drawHearts);
      }

      // ----- iniciar música al primer toque y ocultar hint -----
      function startMusicAndTouch(evt) {
        // Prevenir scrolling o zoom en móvil al tocar
        evt.preventDefault?.();

        if (!musicStarted) {
          audio.play().then(() => {
            console.log('🎵 Música empezó');
            musicStarted = true;
            if (hint) hint.style.opacity = '0';   // desaparece hint
          }).catch(err => {
            console.warn('No se pudo reproducir música automáticamente:', err);
            // Aún así, consideramos que hubo interacción y no volvemos a intentar
            musicStarted = true;
            if (hint) hint.style.opacity = '0';
          });
        }

        // Obtener coordenadas del toque para la explosión de corazones
        let clientX, clientY;
        if (evt.touches) {
          // evento táctil
          clientX = evt.touches[0].clientX;
          clientY = evt.touches[0].clientY;
        } else {
          // mouse o pointer
          clientX = evt.clientX;
          clientY = evt.clientY;
        }

        // Añadir ráfaga de corazones en esa posición
        if (width && height) {
          burstHearts(clientX, clientY, 20);
        }

        // No evitar más que el primer preventDefault para no bloquear todo
      }

      // ----- listeners para touch y mouse (inicio de música y bursts) -----
      function attachListeners() {
        // Usamos 'touchstart' y 'mousedown' para máxima compatibilidad
        document.addEventListener('touchstart', (e) => {
          startMusicAndTouch(e);
        }, { passive: false });

        document.addEventListener('mousedown', (e) => {
          startMusicAndTouch(e);
        });

        // También queremos bursts con el movimiento táctil? solo start basta, pero añadimos un pequeño extra en touchmove? 
        // Podríamos añadir algo más sutil, pero mejor no saturar.
        // Pero para dar más interactividad: también en touchmove generamos algunos corazones (pero menos)
        document.addEventListener('touchmove', (e) => {
          if (!musicStarted) return; // si no ha empezado música, no hacemos burst, pero ya empezó con el primer touch
          e.preventDefault?.();       // evitar scroll mientras se desliza
          if (e.touches.length > 0) {
            const x = e.touches[0].clientX;
            const y = e.touches[0].clientY;
            // añadir solo 1 corazón por evento move para no saturar
            if (Math.random() < 0.3) { // probabilidad para mantener fluidez
              addHeart(x, y, 16 + Math.random()*12, 0.3 + Math.random()*0.4, 0.7, 0.9);
            }
          }
        }, { passive: false });

        // mouseMove también pero suave
        document.addEventListener('mousemove', (e) => {
          if (!musicStarted) return;
          if (Math.random() < 0.15) { // pocos para no ser invasivo
            addHeart(e.clientX, e.clientY, 14 + Math.random()*14, 0.3, 0.5, 0.8);
          }
        });
      }

      // ----- Generar corazones ambientales cada 400ms -----
      setInterval(() => {
        if (!width || !height) return;
        spawnAmbientHeart();
        // a veces dos a la vez
        if (Math.random() > 0.6) spawnAmbientHeart();
      }, 400);

      // ----- Iniciar animación -----
      drawHearts();

      // ----- Activar listeners -----
      attachListeners();

      // ----- Prevenir gestos de navegación en iOS / Android (mejora experiencia) -----
      document.body.addEventListener('touchstart', (e) => {
        if (e.target === canvas) e.preventDefault();
      }, { passive: false });

      // También prevenir el menú contextual en móvil (largo press)
      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // Pequeño detalle: cambiar el hint cuando ya se tocó (lo ocultamos antes)
      // pero se maneja en startMusicAndTouch
    })();
  </script>
</body>
</html>
