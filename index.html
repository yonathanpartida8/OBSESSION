<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#090004">
  <title>Te Amo Marissa · experiencia infinita</title>
  <!-- fuentes elegantes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cutive+Mono&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET Y VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rose: #e0003f;
      --blush: #ff7aa0;
      --petal: #ffd6e4;
      --ivory: #faf0f2;
      --dark: #090004;
      --shadow-rose: rgba(224, 0, 63, 0.7);
      --shadow-blush: rgba(255, 122, 160, 0.5);
      --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Cormorant Garamond', serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      cursor: none; /* cursor personalizado */
    }

    /* ===== CURSOR PERSONALIZADO (se oculta en móvil) ===== */
    #custom-cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--rose);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px var(--shadow-rose), 0 0 24px rgba(224, 0, 63, 0.4);
      transition: width 0.2s, height 0.2s, opacity 0.3s;
      will-change: transform;
    }
    #custom-cursor.big {
      width: 36px;
      height: 36px;
      opacity: 0.4;
    }
    @media (hover: none) and (pointer: coarse) {
      #custom-cursor { display: none; }
      body { cursor: auto; }
    }

    /* ===== FONDO DINÁMICO ===== */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 130% 80% at 10% 110%, rgba(160, 0, 45, 0.5) 0%, transparent 50%),
                  radial-gradient(ellipse 80% 60% at 90% -10%, rgba(100, 0, 30, 0.4) 0%, transparent 50%),
                  radial-gradient(ellipse 60% 50% at 50% 50%, rgba(50, 0, 15, 0.55) 0%, transparent 65%),
                  #07000a;
      animation: bgPulse 9s ease-in-out infinite alternate;
      will-change: filter;
    }
    @keyframes bgPulse {
      from { filter: brightness(1); }
      to   { filter: brightness(1.18); }
    }

    /* ===== ORBES LUMINOSOS ===== */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 1;
      will-change: transform;
    }
    #orb1 { width: 560px; height: 560px; background: radial-gradient(circle, rgba(224, 0, 63, 0.17), transparent 70%); top: -200px; left: -160px; animation: orbFloat1 20s ease-in-out infinite; }
    #orb2 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(180, 0, 50, 0.13), transparent 70%); bottom: -150px; right: -150px; animation: orbFloat2 24s ease-in-out infinite; }
    #orb3 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(255, 120, 160, 0.09), transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: orbPulse 15s ease-in-out infinite; }

    @keyframes orbFloat1 { 50% { transform: translate(55px, 45px); } }
    @keyframes orbFloat2 { 50% { transform: translate(-50px, -60px); } }
    @keyframes orbPulse { 50% { transform: translate(-50%, -50%) scale(1.5); } }

    /* ===== GRANO SUTIL ===== */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.07;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E") 0/180px;
      animation: grainShift 0.1s steps(1) infinite;
    }
    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-2px, 3px); }
      40% { transform: translate(3px, -2px); }
      60% { transform: translate(-3px, 1px); }
      80% { transform: translate(2px, 3px); }
    }

    /* ===== VIÑETA ===== */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 28%, rgba(0, 0, 0, 0.52) 65%, rgba(0, 0, 0, 0.95) 100%);
    }

    /* ===== LLUVIA DE PALABRAS (DOM) ===== */
    #rain-layer {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }
    .rain-drop {
      position: absolute;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--blush);
      text-shadow: 0 0 12px var(--shadow-blush);
      white-space: nowrap;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* ===== CANVAS DE PARTÍCULAS Y ONDAS ===== */
    #particle-canvas, #wave-canvas {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }
    #wave-canvas {
      bottom: 70px;
      top: auto;
      height: 80px;
      opacity: 0.5;
      z-index: 6;
    }

    /* ===== FLASH (BEAT) ===== */
    #flash {
      position: fixed;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      background: rgba(224, 0, 63, 0.06);
      opacity: 0;
      transition: opacity 0.22s ease-out;
    }

    /* ===== DEDICATORIA SUPERIOR ===== */
    #dedication {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 20px 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 3s;
    }
    .ded-label {
      font-family: 'Cutive Mono', monospace;
      font-size: clamp(9px, 1.2vw, 11px);
      letter-spacing: 7px;
      color: rgba(255, 214, 228, 0.22);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .ded-name {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(18px, 4.5vw, 56px);
      letter-spacing: 0.06em;
      color: var(--ivory);
      line-height: 1.1;
      text-align: center;
      text-shadow: 0 0 50px var(--shadow-rose), 0 0 110px rgba(224, 0, 63, 0.3), 0 2px 5px #000;
      animation: nameGlow 3.5s ease-in-out infinite;
    }
    @keyframes nameGlow {
      50% { text-shadow: 0 0 80px rgba(224, 0, 63, 1), 0 0 180px rgba(224, 0, 63, 0.6), 0 2px 5px #000; }
    }
    .ded-rule {
      width: 42px;
      height: 1px;
      margin-top: 8px;
      background: linear-gradient(to right, transparent, var(--rose), transparent);
      animation: rulePulse 2.5s ease-in-out infinite;
    }
    @keyframes rulePulse {
      50% { width: 76px; opacity: 1; }
    }

    /* ===== CONTENEDOR DE LETRAS ===== */
    #lyrics-stage {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 140px 28px 110px;
      pointer-events: none;
    }
    #lyrics-box {
      width: min(92vw, 880px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .lyric-line {
      display: block;
      opacity: 0;
      transform: translateY(24px) scale(0.93);
      transition: opacity 0.5s var(--transition-smooth), transform 0.5s var(--transition-smooth);
      will-change: opacity, transform;
    }
    .lyric-line.in {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .lyric-line.out {
      opacity: 0;
      transform: translateY(-14px) scale(1.03);
      transition: opacity 0.55s ease-in, transform 0.55s ease-in;
    }
    /* estilos de línea */
    .lyric-line.normal  { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: clamp(20px, 4.5vw, 60px); color: var(--ivory); text-shadow: 0 0 28px rgba(224, 0, 63, 0.5), 0 2px 4px #000; }
    .lyric-line.italic  { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: clamp(22px, 5vw, 66px); color: var(--ivory); text-shadow: 0 0 36px rgba(224, 0, 63, 0.6), 0 2px 4px #000; }
    .lyric-line.bold    { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(24px, 5.4vw, 72px); color: var(--petal); text-shadow: 0 0 50px rgba(224, 0, 63, 0.9), 0 0 120px rgba(224, 0, 63, 0.35), 0 2px 6px #000; }
    .lyric-line.huge    { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: clamp(38px, 9vw, 120px); letter-spacing: 0.08em; color: var(--ivory); text-shadow: 0 0 65px rgba(224, 0, 63, 1), 0 0 140px rgba(224, 0, 63, 0.55), 0 4px 12px #000; }
    .lyric-line.small   { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: clamp(13px, 2.4vw, 32px); color: rgba(250, 240, 242, 0.45); letter-spacing: 0.07em; }
    .lyric-line.mono    { font-family: 'Cutive Mono', monospace; font-size: clamp(10px, 1.5vw, 18px); letter-spacing: 0.3em; color: rgba(255, 214, 228, 0.2); }
    .lyric-line.love    { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: clamp(26px, 6.5vw, 92px); letter-spacing: 0.07em; color: var(--blush); text-shadow: 0 0 55px rgba(255, 122, 160, 1), 0 0 130px rgba(255, 122, 160, 0.5), 0 0 210px rgba(224, 0, 63, 0.4); animation: loveBeat 1.1s ease-in-out infinite; }
    @keyframes loveBeat { 50% { transform: scale(1.05); } }

    .lyric-line .word {
      display: inline-block;
      transition: color 0.1s, text-shadow 0.1s;
    }
    .lyric-line .word.lit {
      color: var(--blush);
      text-shadow: 0 0 20px rgba(255, 122, 160, 0.9), 0 0 50px rgba(255, 122, 160, 0.5);
    }

    /* ===== REPRODUCTOR ===== */
    #audio-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px 18px;
      background: linear-gradient(to top, rgba(7, 0, 10, 0.97), transparent);
      backdrop-filter: blur(4px);
    }
    #play-pause-btn {
      width: 46px;
      height: 46px;
      flex-shrink: 0;
      border: 1.5px solid rgba(224, 0, 63, 0.5);
      border-radius: 50%;
      background: transparent;
      color: var(--ivory);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.22s;
    }
    #play-pause-btn:hover, #play-pause-btn:active {
      background: var(--rose);
      border-color: var(--rose);
      box-shadow: 0 0 22px var(--shadow-rose);
      transform: scale(1.1);
    }
    #progress-wrap {
      flex: 1;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--rose), var(--blush));
      border-radius: 3px;
      transition: width 0.1s linear;
      position: relative;
    }
    #progress-fill::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--blush);
      box-shadow: 0 0 10px rgba(255, 122, 160, 0.9), 0 0 22px rgba(255, 122, 160, 0.5);
    }
    #time-display {
      font-family: 'Cutive Mono', monospace;
      font-size: 11px;
      color: rgba(255, 214, 228, 0.28);
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    #volume-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }
    #volume-wrap span {
      font-family: 'Cutive Mono', monospace;
      font-size: 10px;
      color: rgba(255, 214, 228, 0.22);
      letter-spacing: 3px;
    }
    #volume-slider {
      width: 62px;
      accent-color: var(--rose);
      cursor: pointer;
    }
    @media (max-width: 520px) {
      #volume-wrap { display: none; }
      #audio-bar { padding: 10px 14px 16px; gap: 10px; }
    }

    /* ===== PANTALLA DE INICIO ===== */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: radial-gradient(ellipse at center, #110007, #000003);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 1.6s;
      pointer-events: auto;
    }
    #start-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .start-pre {
      font-family: 'Cutive Mono', monospace;
      font-size: clamp(9px, 1.3vw, 12px);
      letter-spacing: 8px;
      color: rgba(255, 210, 228, 0.22);
      text-transform: uppercase;
      animation: blink 2.6s ease-in-out infinite;
    }
    .start-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(36px, 10vw, 120px);
      letter-spacing: 0.06em;
      color: var(--ivory);
      line-height: 1.08;
      text-align: center;
      text-shadow: 0 0 90px rgba(224, 0, 63, 0.55);
      max-width: 88vw;
    }
    .start-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(14px, 2.4vw, 26px);
      color: var(--blush);
      letter-spacing: 0.05em;
      text-shadow: 0 0 22px rgba(255, 122, 160, 0.5);
      animation: blink 2s ease-in-out infinite;
      margin-top: 2px;
    }
    .start-btn {
      margin-top: 32px;
      border: 1px solid rgba(224, 0, 63, 0.45);
      color: rgba(250, 240, 242, 0.55);
      background: transparent;
      font-family: 'Cutive Mono', monospace;
      font-size: 11px;
      letter-spacing: 7px;
      padding: 14px 46px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.28s;
      animation: blink 2s ease-in-out infinite;
    }
    .start-btn:hover, .start-btn:active {
      background: var(--rose);
      color: var(--ivory);
      border-color: var(--rose);
      box-shadow: 0 0 28px var(--shadow-rose);
      transform: scale(1.05);
    }
    @keyframes blink { 50% { opacity: 0.3; } }

    /* ===== EFECTOS TÁCTILES ===== */
    .ripple-effect {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 500;
      transform: translate(-50%, -50%) scale(0);
      animation: rippleAnim 0.78s ease-out forwards;
    }
    @keyframes rippleAnim {
      to { transform: translate(-50%, -50%) scale(7); opacity: 0; }
    }
    .tap-word {
      position: fixed;
      pointer-events: none;
      z-index: 501;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--blush);
      white-space: nowrap;
      text-shadow: 0 0 16px rgba(255, 122, 160, 0.8);
      animation: wordFloat 0.95s ease-out forwards;
    }
    @keyframes wordFloat {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5) translateY(0); }
      55% { opacity: 1; transform: translate(-50%, -50%) scale(1.1) translateY(-55px); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9) translateY(-110px); }
    }
  </style>
</head>

    <div class="start-pre">para siempre contigo</div>
    <div class="start-title">Te Amo<br>Marissa</div>

    <button class="start-btn" id="start-button">Reproducir</button>

  <div id="grain"></div>
  <div id="vignette"></div>

  <div id="rain-layer"></div>

  <!-- CANVAS PARTÍCULAS Y ONDAS -->
  <canvas id="particle-canvas"></canvas>
  <canvas id="wave-canvas"></canvas>
  <div id="flash"></div>

  <!-- DEDICATORIA -->
  <div id="dedication">

  <!-- LETRAS -->

  <!-- AUDIO (mismo directorio) -->

        { t:282, lines:['Come from way above'],                    styles:['italic'],                 beat:false },
        { t:287, lines:['To bring me love'],                       styles:['bold'],                   beat:true  },
        { t:292, lines:['me encantas, Johana'],                    styles:['love'],                   beat:true  },
        { t:297, lines:['You are my angel'],                       styles:['bold'],                   beat:false },
        { t:302, lines:['Come from way above'],                    styles:['italic'],                 beat:false },
        { t:307, lines:['To bring me love'],                       styles:['huge'],                   beat:true  },
        { t:313, lines:['come to me'],                             styles:['italic'],                 beat:false },
        { t:318, lines:['from way above'],                         styles:['small'],                  beat:false },
        { t:322, lines:['from way above'],                         styles:['small'],                  beat:false },
        { t:326, lines:['Te Amo'],                                 styles:['huge'],                   beat:true  },
        { t:330, lines:['i love you','Marissa'],                   styles:['love','bold'],             beat:true  },
        { t:336, lines:['from way above'],                         styles:['small'],                  beat:false },
        { t:340, lines:['siempre'],                                styles:['huge'],                   beat:true  },
        { t:344, lines:['You are my angel'],                       styles:['bold'],                   beat:false },
        { t:349, lines:['Come from way above'],                    styles:['italic'],                 beat:false },
        { t:354, lines:['To bring me love'],                       styles:['bold'],                   beat:true  },
        { t:358, lines:['i love you'],                             styles:['love'],                   beat:true  },
        { t:362, lines:['You are my angel'],                       styles:['italic'],                 beat:false },
        { t:366, lines:['Come from way above'],                    styles:['italic'],                 beat:false },
        { t:370, lines:['To bring me love'],                       styles:['huge'],                   beat:true  },
        { t:374, lines:['Te Amo Marissa'],                         styles:['love'],                   beat:true  },
        { t:377, lines:['me encantas, Johana'],                    styles:['love'],                   beat:true  },
      ];

      const RAIN_WORDS = ['i love you','te amo','Marissa','Johana','siempre','forever','mi amor','angel','me encantas','i love you','para siempre','te adoro'];
      const TAP_WORDS  = ['i love you','te amo','Marissa','Johana','siempre','para siempre','mi amor','me encantas','te adoro','forever','con todo','amor'];

      // --- Elementos DOM ---
      const audio = document.getElementById('audio-player');
      const startScreen = document.getElementById('start-screen');
      const startBtn = document.getElementById('start-button');
      const playPauseBtn = document.getElementById('play-pause-btn');
      const progressFill = document.getElementById('progress-fill');
      const progressWrap = document.getElementById('progress-wrap');
      const timeDisplay = document.getElementById('time-display');
      const volumeSlider = document.getElementById('volume-slider');
      const flashEl = document.getElementById('flash');
      const cursor = document.getElementById('custom-cursor');
      const rainLayer = document.getElementById('rain-layer');
      const lineSlots = [document.getElementById('line0'), document.getElementById('line1'), document.getElementById('line2')];
      const dedication = document.getElementById('dedication');

      // --- Estado ---
      let cueIndex = -1;
      let audioContext = null;
      let analyser = null;
      let source = null;
      let frequencyData = null;
      let audioReady = false;
      let rainActive = false;
      let wordTimer = null;
      let isPlaying = false; // para sincronizar UI

      // --- Inicialización: intentar autoplay silenciado ---
      async function initAutoplay() {
        try {
          audio.volume = 0; // silencio
          await audio.play();
          // Éxito: podemos iniciar todo
          console.log('Autoplay con volumen 0 OK');
          startScreen.classList.add('fade-out');
          setupAfterPlay();
          // Fade-in de volumen
          let vol = 0;
          const interval = setInterval(() => {
            vol += 0.05;
            if (vol >= 0.9) {
              audio.volume = 0.9;
              volumeSlider.value = '0.9';
              clearInterval(interval);
            } else {
              audio.volume = vol;
              volumeSlider.value = vol.toString();
            }
          }, 100);
        } catch (e) {
          console.log('Autoplay bloqueado, esperando interacción');
          // No hacer nada, la pantalla de inicio permanece
        }
      }

      // --- Configurar después de reproducir ---
      function setupAfterPlay() {
        if (audioReady) return;
        audioReady = true;
        playPauseBtn.innerHTML = '⏸️'; // pausa

        // Crear AudioContext y analizador
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256;
          frequencyData = new Uint8Array(analyser.frequencyBinCount);
          source = audioContext.createMediaElementSource(audio);
          source.connect(analyser);
          analyser.connect(audioContext.destination);
        } catch (e) {
          console.warn('AudioContext no soportado, se omite análisis');
        }

        // Iniciar lluvia
        if (!rainActive) {
          rainActive = true;
          spawnRainLoop();
        }

        // Mostrar dedicación lentamente
        setTimeout(() => { dedication.style.opacity = '0.14'; }, 6000);
      }

      // --- Evento clic en botón inicio ---
      startBtn.addEventListener('click', () => {
        if (!audioReady) {
          audio.volume = parseFloat(volumeSlider.value);
          audio.play().then(() => {
            startScreen.classList.add('fade-out');
            setupAfterPlay();
          }).catch(e => console.log('Error al reproducir:', e));
        } else {
          startScreen.classList.add('fade-out');
        }
      });

      // --- Play / Pausa ---
      playPauseBtn.addEventListener('click', () => {
        if (!audioReady) {
          // Forzar inicio si no está listo
          audio.volume = parseFloat(volumeSlider.value);
          audio.play().then(() => {
            startScreen.classList.add('fade-out');
            setupAfterPlay();
          });
          return;
        }
        if (audio.paused) {
          if (audioContext && audioContext.state === 'suspended') audioContext.resume();
          audio.play().then(() => { playPauseBtn.innerHTML = '⏸️'; });
        } else {
          audio.pause();
          playPauseBtn.innerHTML = '▶';
        }
      });

      // --- Barra de progreso (seek) ---
      progressWrap.addEventListener('click', (e) => {
        if (!audio.duration) return;
        const rect = progressWrap.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        audio.currentTime = percent * audio.duration;
      });

      // --- Actualización tiempo ---
      function formatTime(seconds) {
        seconds = Math.floor(seconds || 0);
        const mins = Math.floor(seconds / 60);
        const secs = String(seconds % 60).padStart(2, '0');
        return `${mins}:${secs}`;
      }

      audio.addEventListener('timeupdate', () => {
        const t = audio.currentTime;
        const d = audio.duration || 0;
        if (d) progressFill.style.width = `${(t / d) * 100}%`;
        timeDisplay.textContent = d ? `${formatTime(t)} / ${formatTime(d)}` : formatTime(t);

        // Cambiar cue
        const idx = findCueIndex(t);
        if (idx !== cueIndex) {
          cueIndex = idx;
          if (idx >= 0) showCue(CUES[idx]);
        }

        // Analizador para partículas (si existe)
        if (analyser && frequencyData) {
          analyser.getByteFrequencyData(frequencyData);
          const bass = frequencyData.slice(0, 4).reduce((a, b) => a + b, 0) / 4;
          if (bass > 172) burstParticles(2);
        }
      });

      audio.addEventListener('ended', () => {
        playPauseBtn.innerHTML = '▶';
        lineSlots.forEach(slot => {
          slot.classList.remove('in');
          slot.classList.add('out');
        });
        setTimeout(() => {
          lineSlots.forEach(clearLineSlot);
          // Mostrar mensaje final
          const finalLines = ['Te Amo Marissa', 'Me Encantas, Johana'];
          finalLines.forEach((txt, i) => {
            clearLineSlot(lineSlots[i]);
            lineSlots[i].classList.add('love');
            lineSlots[i].textContent = txt;
            setTimeout(() => lineSlots[i].classList.add('in'), i * 220);
          });
        }, 900);
      });

      function findCueIndex(time) {
        let idx = -1;
        for (let i = 0; i < CUES.length; i++) {
          if (CUES[i].t <= time) idx = i;
          else break;
        }
        return idx;
      }

      function clearLineSlot(el) {
        el.classList.remove('in', 'out', 'normal', 'italic', 'bold', 'huge', 'small', 'mono', 'love');
        el.textContent = '';
      }

      function showCue(cue) {
        // Marcar líneas actuales como out
        lineSlots.forEach(slot => {
          if (slot.classList.contains('in')) {
            slot.classList.remove('in');
            slot.classList.add('out');
            setTimeout(() => clearLineSlot(slot), 700);
          }
        });
        if (!cue.lines || !cue.lines.length) return;

        if (cue.beat) {
          flashEl.style.transition = 'none';
          flashEl.style.opacity = '1';
          requestAnimationFrame(() => {
            flashEl.style.transition = 'opacity 0.22s ease-out';
            flashEl.style.opacity = '0';
          });
          burstParticles(5);
        }

        cue.lines.forEach((txt, i) => {
          const slot = lineSlots[i];
          if (!slot) return;
          clearLineSlot(slot);
          const style = (cue.styles && cue.styles[i]) || 'normal';
          slot.classList.add(style);
          if (txt && style !== 'mono') {
            // Dividir en palabras para efecto lit
            slot.innerHTML = txt.split(' ').map(w => `<span class="word">${w}</span>`).join(' ');
          } else {
            slot.textContent = txt;
          }
          // Pequeño retraso para entrada elegante
          setTimeout(() => slot.classList.add('in'), i * 65);
        });
        if (cue.lines[0]) animateWords(0);
      }

      function animateWords(lineIdx) {
        if (wordTimer) clearTimeout(wordTimer);
        const slot = lineSlots[lineIdx];
        if (!slot) return;
        const words = slot.querySelectorAll('.word');
        if (!words.length) return;
        let wIndex = 0;
        function step() {
          if (wIndex > 0) words[wIndex-1].classList.remove('lit');
          if (wIndex < words.length) {
            words[wIndex].classList.add('lit');
            wIndex++;
            wordTimer = setTimeout(step, 185 + Math.random() * 95);
          }
        }
        step();
      }

      // --- Lluvia de palabras (DOM) ---
      const COLS = 7;
      const colCooldown = new Array(COLS).fill(0);

      function spawnRainLoop() {
        if (!rainActive) return;
        spawnRainDrop();
        setTimeout(spawnRainLoop, 500 + Math.random() * 800);
      }

      function spawnRainDrop(forcedX) {
        const word = RAIN_WORDS[Math.floor(Math.random() * RAIN_WORDS.length)];
        const fontSize = 12 + Math.random() * 11;
        const opacity = 0.10 + Math.random() * 0.18;
        const duration = 8000 + Math.random() * 7000;

        // Seleccionar columna con menor cooldown
        let col = 0;
        let minCooldown = Infinity;
        const now = Date.now();
        for (let i = 0; i < COLS; i++) {
          if (colCooldown[i] < minCooldown) {
            minCooldown = colCooldown[i];
            col = i;
          }
        }
        colCooldown[col] = now + 900 + Math.random() * 600;

        const colWidth = window.innerWidth / COLS;
        const startX = forcedX !== undefined ? forcedX : col * colWidth + colWidth * 0.25 + Math.random() * colWidth * 0.5;

        const el = document.createElement('div');
        el.className = 'rain-drop';
        el.textContent = word;
        el.style.left = startX + 'px';
        el.style.top = '-28px';
        el.style.fontSize = fontSize + 'px';
        el.style.opacity = '0';

        rainLayer.appendChild(el);

        const anim = el.animate([
          { opacity: 0, transform: 'translateY(0)' },
          { opacity: opacity, transform: `translateY(${window.innerHeight * 0.1}px)`, offset: 0.07 },
          { opacity: opacity, transform: `translateY(${window.innerHeight * 0.88}px)`, offset: 0.93 },
          { opacity: 0, transform: `translateY(${window.innerHeight + 28}px)` }
        ], { duration: duration, easing: 'linear', fill: 'forwards' });

        anim.onfinish = () => el.remove();
      }

      // --- Partículas (canvas) ---
      const particleCanvas = document.getElementById('particle-canvas');
      const pCtx = particleCanvas.getContext('2d');
      let particles = [];

      function resizeParticleCanvas() {
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;
      }
      resizeParticleCanvas();
      window.addEventListener('resize', resizeParticleCanvas);

      class Particle {
        constructor(x, y) {
          this.x = x ?? Math.random() * particleCanvas.width;
          this.y = y ?? Math.random() * particleCanvas.height;
          this.vx = (Math.random() - 0.5) * 1.8;
          this.vy = (Math.random() - 1.7) * 1.9;
          this.alpha = Math.random() * 0.55 + 0.2;
          this.radius = Math.random() * 2.8 + 0.4;
          this.color = Math.random() > 0.5 ? '#e0003f' : '#ff7aa0';
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vy += 0.042;
          this.alpha -= 0.008;
        }
        draw() {
          pCtx.save();
          pCtx.globalAlpha = Math.max(0, this.alpha);
          pCtx.fillStyle = this.color;
          pCtx.shadowColor = this.color;
          pCtx.shadowBlur = 8;
          pCtx.beginPath();
          pCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          pCtx.fill();
          pCtx.restore();
        }
      }

      function burstParticles(count, x, y) {
        const cx = x ?? particleCanvas.width / 2;
        const cy = y ?? particleCanvas.height / 2;
        for (let i = 0; i < count; i++) {
          particles.push(new Particle(
            cx + (Math.random() - 0.5) * 70,
            cy + (Math.random() - 0.5) * 35
          ));
        }
      }

      // Generar partículas de fondo
      setInterval(() => {
        if (particles.length < 45) particles.push(new Particle());
      }, 700);

      function animateParticles() {
        requestAnimationFrame(animateParticles);
        pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
        particles = particles.filter(p => p.alpha > 0);
        particles.forEach(p => { p.update(); p.draw(); });
      }
      animateParticles();

      // --- Wave canvas ---
      const waveCanvas = document.getElementById('wave-canvas');
      const wCtx = waveCanvas.getContext('2d');
      function resizeWave() {
        waveCanvas.width = window.innerWidth;
        waveCanvas.height = 80;
      }
      resizeWave();
      window.addEventListener('resize', resizeWave);

      function drawWave() {
        requestAnimationFrame(drawWave);
        if (!analyser || !frequencyData) return;
        analyser.getByteFrequencyData(frequencyData);
        wCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
        const bars = frequencyData.length;
        const barWidth = (waveCanvas.width / bars) * 1.85;
        let x = 0;
        for (let i = 0; i < bars; i++) {
          const val = frequencyData[i] / 255;
          const h = val * waveCanvas.height;
          const grad = wCtx.createLinearGradient(0, waveCanvas.height - h, 0, waveCanvas.height);
          grad.addColorStop(0, `rgba(224, 0, 63, ${val * 0.95})`);
          grad.addColorStop(0.5, `rgba(255, 122, 160, ${val * 0.45})`);
          grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
          wCtx.fillStyle = grad;
          wCtx.fillRect(x, waveCanvas.height - h, barWidth - 0.8, h);
          x += barWidth + 0.3;
        }
      }
      drawWave();

      // --- Efectos táctiles / clic ---
      function spawnTapEffect(x, y) {
        // Anillos
        const rings = [
          { size: 26, border: '1.5px solid var(--rose)', delay: 0 },
          { size: 16, border: '1px solid var(--blush)', delay: 140 },
          { size: 44, border: '1px solid rgba(255,122,160,0.25)', delay: 280 }
        ];
        rings.forEach(({ size, border, delay }) => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple-effect';
          ripple.style.cssText = `left:${x}px; top:${y}px; width:${size}px; height:${size}px; border:${border}; animation-delay:${delay}ms;`;
          document.body.appendChild(ripple);
          setTimeout(() => ripple.remove(), 900 + delay);
        });

        // Palabra principal
        const word = TAP_WORDS[Math.floor(Math.random() * TAP_WORDS.length)];
        const tapWord = document.createElement('div');
        tapWord.className = 'tap-word';
        tapWord.textContent = word;
        tapWord.style.left = x + 'px';
        tapWord.style.top = y + 'px';
        tapWord.style.fontSize = (14 + Math.random() * 10) + 'px';
        document.body.appendChild(tapWord);
        setTimeout(() => tapWord.remove(), 1000);

        // Segunda palabra (opcional)
        if (Math.random() > 0.42) {
          const word2 = TAP_WORDS[Math.floor(Math.random() * TAP_WORDS.length)];
          const tapWord2 = document.createElement('div');
          tapWord2.className = 'tap-word';
          tapWord2.textContent = word2;
          tapWord2.style.left = (x + (Math.random() - 0.5) * 55) + 'px';
          tapWord2.style.top = (y + 14) + 'px';
          tapWord2.style.fontSize = (11 + Math.random() * 8) + 'px';
          tapWord2.style.opacity = '0.6';
          tapWord2.style.animationDelay = '0.2s';
          document.body.appendChild(tapWord2);
          setTimeout(() => tapWord2.remove(), 1200);
        }

        // Partículas extra y gotas
        burstParticles(10, x, y);
        for (let i = 0; i < 3; i++) {
          setTimeout(() => spawnRainDrop(x + (Math.random() - 0.5) * 70), i * 90);
        }
      }

      document.addEventListener('click', (e) => {
        cursor.classList.add('big');
        setTimeout(() => cursor.classList.remove('big'), 200);
        spawnTapEffect(e.clientX, e.clientY);
      });

      document.addEventListener('touchstart', (e) => {
        Array.from(e.touches).forEach(t => spawnTapEffect(t.clientX, t.clientY));
      }, { passive: true });

      // --- Cursor movimiento ---
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });

      // --- Volumen ---
      volumeSlider.addEventListener('input', (e) => {
        audio.volume = parseFloat(e.target.value);
      });

      // --- Teclado (opcional) ---
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          e.preventDefault();
          playPauseBtn.click();
        }
        if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.currentTime + 10, audio.duration || 0);
        if (e.code === 'ArrowLeft') audio.currentTime = Math.max(audio.currentTime - 10, 0);
        if (e.code === 'ArrowUp') {
          audio.volume = Math.min(audio.volume + 0.08, 1);
          volumeSlider.value = audio.volume.toString();
        }
        if (e.code === 'ArrowDown') {
          audio.volume = Math.max(audio.volume - 0.08, 0);
          volumeSlider.value = audio.volume.toString();
        }
      });

      // --- Iniciar autoplay silenciado al cargar ---
      window.addEventListener('load', () => {
        initAutoplay();
      });

    })();
  </script>
</body>
</html>
